<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steak — Live Subscribers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap">
<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    /* Prevent text selection and dragging on everything */
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-user-drag: none;
  }
  
  html, body {
    height: 100%;
    background: #000000;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* Subtle breathing background glow */
  body::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255, 0, 0, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
    transform: translate(-50%, -50%);
    animation: breathe 6s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }

  .container {
    position: relative;
    z-index: 1;
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 1s cubic-bezier(.22, 1, .36, 1) 0.2s forwards;
  }

  @keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .live-tag {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888888;
    font-weight: 400;
    margin-bottom: 2.5rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    background: #ff3b3b;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255, 59, 59, 0.6);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .counter-wrapper {
    margin-bottom: 3rem;
    position: relative;
    transition: transform 0.4s cubic-bezier(.22, 1, .36, 1);
  }
  
  .counter-wrapper:hover {
    transform: scale(1.02);
  }

  .counter-wrapper iframe {
    display: block;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
    pointer-events: none; /* Stops interaction/dragging inside the iframe */
  }

  .name {
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 500;
    letter-spacing: -0.03em;
    margin-bottom: 1rem;
    color: #ffffff;
  }

  .description {
    font-size: 1rem;
    font-weight: 300;
    color: #666666;
    max-width: 420px;
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }

  .channel-link {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.85rem 1.75rem;
    border: 1px solid #333333;
    border-radius: 50px;
    color: #ffffff;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    background: rgba(255, 255, 255, 0.03);
    transition: all 0.3s cubic-bezier(.22, 1, .36, 1);
    -webkit-user-drag: none;
  }

  .channel-link svg {
    width: 18px;
    height: 18px;
    fill: #ff0000;
    transition: fill 0.3s ease;
    pointer-events: none; /* Prevents dragging the icon */
  }

  .channel-link:hover {
    background: #ffffff;
    border-color: #ffffff;
    color: #000000;
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
  }

  .channel-id {
    margin-top: 3rem;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #333333;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }

  @media (prefers-reduced-motion: reduce) {
    body::before, .live-dot { animation: none; }
    .container { animation: none; opacity: 1; transform: none; }
  }
</style>
</head>
<body>

  <div class="container">
    <div class="live-tag">
      <span class="live-dot"></span>
      <span>Live Count</span>
    </div>

    <div class="counter-wrapper">
      <iframe
        height="80"
        width="300"
        frameborder="0"
        src="https://livecounts.io/embed/youtube-live-subscriber-counter/UC7c8wbA9yQjzxkj2uyrHrkg?dark=1"
        style="border: 0; width: 300px; height: 80px;"
        title="Steak live subscriber count"></iframe>
    </div>

    <h1 class="name">Steak</h1>
    <p class="description">Real-time YouTube subscriber count, refreshed every couple of seconds.</p>
    
    <a href="https://www.youtube.com/channel/UC7c8wbA9yQjzxkj2uyrHrkg" target="_blank" rel="noopener" class="channel-link">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      Visit Channel
    </a>

    <div class="channel-id">UC7c8wbA9yQjzxkj2uyrHrkg</div>
  </div>

  <script>
    // Disable right-click context menu globally
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    // Disable dragging globally
    document.addEventListener('dragstart', function(e) {
      e.preventDefault();
    });
  </script>

</body>
</html>
